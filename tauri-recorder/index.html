<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 SiC Screen Recorder</title>
</head>
<body>
    <div id="app">
        <h1>🎬 SiC Screen Recorder</h1>
        <p class="subtitle">Milestone Documentation Tool</p>

        <div id="status" class="status">
            Ready to record
        </div>

        <div class="controls">
            <button id="startBtn" class="btn start-btn">
                ⏺ Start Recording
            </button>
            <button id="stopBtn" class="btn stop-btn" style="display: none;">
                ⏹ Stop Recording
            </button>
        </div>

        <div class="info">
            <p>📹 WebM format • High quality</p>
            <p class="credits">Built with ❤️‍🔥 by Monty 🩵 & Koda 🧡</p>
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        #app {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            min-width: 500px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .status {
            font-size: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-weight: 500;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.recording {
            background: rgba(255, 59, 48, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .controls {
            margin-bottom: 40px;
        }

        .btn {
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .start-btn {
            background: #34C759;
        }

        .start-btn:hover {
            background: #30B350;
        }

        .stop-btn {
            background: #FF3B30;
        }

        .stop-btn:hover {
            background: #E6342A;
        }

        .info {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.8;
        }

        .credits {
            margin-top: 10px;
            font-size: 13px;
            opacity: 0.7;
        }
    </style>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
